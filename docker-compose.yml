services:
  redis:
    image: redis:7-alpine
    container_name: userbot_redis
    restart: always
    command: redis-server --requirepass "${REDIS_PASS:-yourdefaultpassword}" --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - userbot_net

  userbot:
    # Pull pre-built image from GitHub Container Registry
    image: ghcr.io/hikari-work/userbot:latest
    
    container_name: userbot_app
    restart: always
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - REDIS_URI=redis:6379
      - REDIS_PASS=${REDIS_PASS:-yourdefaultpassword}
    volumes:
      # Persist SQLite sessions and other data files
      - ./sessions:/app/sessions
      # Persist downloads
      - ./downloads:/app/downloads
    networks:
      - userbot_net

volumes:
  redis_data:

networks:
  userbot_net:
    driver: bridge
